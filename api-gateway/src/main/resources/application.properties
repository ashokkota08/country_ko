spring.application.name=api-gateway

server.port=${SERVER_PORT:8080}

# JWT
jwt.secret=${JWT_SECRET:mySecretKey12345678901234567890123}

#app.cors.allowed-origins=http://localhost:3000,http://192.168.3.44:3000

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/users
spring.datasource.username=${db_username}
spring.datasource.password=${db_password}

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost

# Routes
spring.cloud.gateway.discovery.locator.enabled=false

spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/product-service/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/order-service/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1


# Management
management.endpoints.web.exposure.include=*
management.endpoint.gateway.enabled=true
management.endpoint.health.show-details=always