spring.application.name=product-service

#app.cors.allowed-origins=http://localhost:3000,http://192.168.3.44:3000

#app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}
 
# Server
server.port=${SERVER_PORT:8081}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/product_service
spring.datasource.username=${db_username}
spring.datasource.password=${db_password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# MySQL driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

eureka.instance.ip-address=127.0.0.1
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false


spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/product-service/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Images are now stored on Cloudinary - no local file serving needed